<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="logo-32.png">
    <link rel="stylesheet" href="animatedLogin.css">
</head>

<body>
    <section>
        <div class="container">
            <div class="user signinBox">
                <!-- <div class="imgBx">
                    <img src="camera1.jpg" alt="">
                </div> -->
                <div class="imgBx">
                    <img src="camera1.jpg" alt="">
                </div>
                <div class="formBx">
                        <form action="">
                            <h2>Sign In</h2>
                            <input type="text" placeholder="Username">
                            <input type="text" placeholder="Password">
                            <input type="submit" value="Login">
                            <p class="signup">don't have account?<a href="#" onclick="toggle();"> Sign up</a></p>
                        </form>
                </div>
            </div>
            
            <!--Second Form-->
            <div class="user signupBox">
                <!-- <div class="imgBx">
                    <img src="camera2.jpg" alt="">
                </div> -->
                <div class="formBx">
                    <form action="">
                        <h2>create an account</h2>
                        <input type="text" placeholder="Username">
                        <input type="text" placeholder="Email Address">
                        <input type="text" placeholder="Create Password">
                        <input type="text" placeholder="Confirm Password">
                        <input type="submit" value="Sign In">
                        <p class="signup">Already have account?<a href="#" onclick="toggle();"> Sign in</a></p>
                    </form>
                </div>
                <div class="imgBx">
                    <img src="camera2.jpg" alt="">
                </div>
            </div>
        </div>
    </section>
    <script>
       function toggle()
       {
        container = document.querySelector('.container');
        container.classList.toggle('active');
        section = document.querySelector('section');
        section.classList.toggle('active');
       }
    </script>
</body>

</html>
